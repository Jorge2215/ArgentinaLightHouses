name: Build & Deploy Azure Function

env:
  DOTNET_VERSION: '10.0.x'
  FUNCTION_APP_NAME: LightHousesFunction

on:
  push:
    branches:
      - main
    paths:
      - 'ArgentinaLightHouses.Functions/**'
      - 'ArgentinaLightHouses.Shared/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Azure Functions Core Tools v4
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function App
        run: |
          cd ArgentinaLightHouses.Functions
          func azure functionapp publish ${{ env.FUNCTION_APP_NAME }} --dotnet-isolated
