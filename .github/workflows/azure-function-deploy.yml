name: Build & Deploy Azure Function

env:
  DOTNET_VERSION: '10.0.x'
  FUNCTION_APP_NAME: LightHousesFunction

on:
  push:
    branches:
      - main
    paths:
      - 'ArgentinaLightHouses.Functions/**'
      - 'ArgentinaLightHouses.Shared/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ArgentinaLightHouses.Functions/ArgentinaLightHouses.Functions.csproj

      - name: Build (Release)
        run: dotnet build ArgentinaLightHouses.Functions/ArgentinaLightHouses.Functions.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ArgentinaLightHouses.Functions/ArgentinaLightHouses.Functions.csproj --configuration Release --output ${{ github.workspace }}/function-publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ${{ github.workspace }}/function-publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ${{ github.workspace }}/function-publish

      - name: Zip publish output
        run: cd ${{ github.workspace }}/function-publish && zip -r ../function-app.zip .

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ${{ github.workspace }}/function-app.zip
          publish-profile: ${{ secrets.AZURE_FUNCTION_PUBLISH_PROFILE }}
