name: Build & Deploy Azure Function

# NOTE: This workflow uses OIDC for authentication (same pattern as azure-deploy.yml).
# The OIDC service principal (AZURE_CLIENT_ID) must have the Contributor role scoped
# to the LightHouses_rg resource group, or at minimum to the LightHousesFunction app.
# Verify the service principal's federated credential subject matches:
#   repo:Jorge2215/ArgentinaLightHouses:ref:refs/heads/main

env:
  DOTNET_VERSION: '10.0.x'
  FUNCTION_APP_NAME: LightHousesFunction
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

on:
  push:
    branches:
      - main
    paths:
      - 'ArgentinaLightHouses.Functions/**'
      - 'ArgentinaLightHouses.Shared/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ArgentinaLightHouses.Functions/ArgentinaLightHouses.Functions.csproj

      - name: Build (Release)
        run: dotnet build ArgentinaLightHouses.Functions/ArgentinaLightHouses.Functions.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ArgentinaLightHouses.Functions/ArgentinaLightHouses.Functions.csproj --configuration Release --output ${{ github.workspace }}/function-publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ${{ github.workspace }}/function-publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ${{ github.workspace }}/function-publish

      - name: Zip publish output
        run: cd ${{ github.workspace }}/function-publish && zip -r ../function-app.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ${{ github.workspace }}/function-app.zip
